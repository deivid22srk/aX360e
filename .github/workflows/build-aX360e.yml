name: aX360e

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          disable-wrapper-validation: true

      - name: Install Vulkan Tools and Ccache
        run: |
          sudo apt-get update
          sudo apt-get install -y glslang-tools spirv-tools ccache

      - name: Cache Ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ github.ref }}-
            ${{ runner.os }}-ccache-

      - name: Decode Keystore
        run: |
          if [ ! -z "${{ secrets.ANDROID_KEYSTORE_B64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > app/release.jks
          else
            echo "No keystore secret provided. Skipping decode."
          fi

      - name: Prepare Gradle file
        run: |
          cp app/build.gradle.bak app/build.gradle

      - name: Detect Version Name
        id: meta
        run: |
          VERSION_NAME=$(grep -oP 'versionName\s+"[^"]+"' app/build.gradle | head -n1 | sed 's/versionName\s*"\(.*\)"/\1/')
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME="unknown"
          fi
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "apk_name=aX360e-${VERSION_NAME}.apk" >> $GITHUB_OUTPUT

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
        run: |
          ccache -s
          if [ -z "${{ secrets.ANDROID_KEYSTORE_B64 }}" ]; then
            echo "Keystore secret not found. Building Debug APK..."
            ./gradlew assembleDebug
          else
            echo "Keystore secret found. Building Signed Release APK..."
            ./gradlew assembleRelease
          fi
          ccache -s

      - name: Rename APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/ -name "*.apk" | head -n1)
          cp "$APK_PATH" "app/build/outputs/apk/${{ steps.meta.outputs.apk_name }}"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aX360e-${{ steps.meta.outputs.version_name }}
          path: app/build/outputs/apk/${{ steps.meta.outputs.apk_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ax360e-${{ steps.meta.outputs.version_name }}
          name: aX360e ${{ steps.meta.outputs.version_name }}
          files: app/build/outputs/apk/${{ steps.meta.outputs.apk_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
